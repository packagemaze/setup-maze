name: Test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0

      - name: Create fake release assets
        run: |
          set -euo pipefail
          mkdir -p fake-release fake-bin
          cat > fake-bin/maze <<'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail
          case "$*" in
            "version") printf 'maze smoke\n' ;;
            "auth exchange-oidc --help") printf 'Exchange a CI OIDC identity token\n' ;;
            "auth exchange-oidc --feed org/feed --purpose install --format github-output")
              printf '::add-mask::fake-install-token\n'
              printf 'token=fake-install-token\n' >> "$GITHUB_OUTPUT"
              printf 'artifact_protocol=npm\n' >> "$GITHUB_OUTPUT"
              printf 'feed_base_url=https://pkg.packagemaze.com/org/feed\n' >> "$GITHUB_OUTPUT"
              ;;
            "auth exchange-oidc --feed org/feed --purpose docker-build --format github-output")
              printf '::add-mask::fake-docker-token\n'
              printf 'token=fake-docker-token\n' >> "$GITHUB_OUTPUT"
              printf 'artifact_protocol=npm\n' >> "$GITHUB_OUTPUT"
              printf 'feed_base_url=https://pkg.packagemaze.com/org/feed\n' >> "$GITHUB_OUTPUT"
              ;;
            "auth exchange-oidc --feed org/admin --purpose docker-build --format github-output")
              printf '::add-mask::fake-admin-docker-token\n'
              printf 'token=fake-admin-docker-token\n' >> "$GITHUB_OUTPUT"
              printf 'artifact_protocol=npm\n' >> "$GITHUB_OUTPUT"
              printf 'feed_base_url=https://pkg.packagemaze.com/org/admin\n' >> "$GITHUB_OUTPUT"
              ;;
            "auth exchange-oidc --feed org/pypi --purpose docker-build --format github-output")
              printf '::add-mask::fake-pypi-docker-token\n'
              printf 'token=fake-pypi-docker-token\n' >> "$GITHUB_OUTPUT"
              printf 'artifact_protocol=pypi\n' >> "$GITHUB_OUTPUT"
              printf 'feed_base_url=http://pkg.packagemaze.test/org/pypi\n' >> "$GITHUB_OUTPUT"
              ;;
            "auth exchange-oidc --feed org/feed --purpose publish --format github-output --package @scope/package")
              printf '::add-mask::fake-publish-token\n'
              printf 'token=fake-publish-token\n' >> "$GITHUB_OUTPUT"
              printf 'artifact_protocol=npm\n' >> "$GITHUB_OUTPUT"
              printf 'feed_base_url=https://pkg.packagemaze.com/org/feed\n' >> "$GITHUB_OUTPUT"
              ;;
            *) printf 'unexpected args: %s\n' "$*" >&2; exit 2 ;;
          esac
          SCRIPT
          chmod +x fake-bin/maze
          tar -C fake-bin -czf fake-release/maze_linux_amd64.tar.gz maze
          (cd fake-release && shasum -a 256 maze_linux_amd64.tar.gz > maze_checksums.txt)

      - name: Serve fake release assets
        run: |
          set -euo pipefail
          python3 -m http.server 8765 --directory fake-release &
          printf '%s\n' "$!" > fake-release-server.pid
          sleep 1

      - id: install_only
        uses: ./
        with:
          release-base-url: http://127.0.0.1:8765

      - name: Check install-only outputs
        env:
          BINARY: ${{ steps.install_only.outputs.binary }}
          INSTALL_PATH: ${{ steps.install_only.outputs.path }}
          TOKEN: ${{ steps.install_only.outputs.token }}
        run: |
          set -euo pipefail
          test -x "$BINARY"
          test -d "$INSTALL_PATH"
          test -z "$TOKEN"
          maze auth exchange-oidc --help

      - id: install_token
        uses: ./
        with:
          release-base-url: http://127.0.0.1:8765
          feed: org/feed

      - name: Check install token output
        env:
          TOKEN: ${{ steps.install_token.outputs.token }}
        run: |
          set -euo pipefail
          test "$TOKEN" = "fake-install-token"

      - id: publish_token
        uses: ./
        with:
          release-base-url: http://127.0.0.1:8765
          feed: org/feed
          purpose: publish
          package: "@scope/package"

      - name: Check publish token output
        env:
          TOKEN: ${{ steps.publish_token.outputs.token }}
        run: |
          set -euo pipefail
          test "$TOKEN" = "fake-publish-token"

      - id: docker_token
        uses: ./
        with:
          release-base-url: http://127.0.0.1:8765
          feed: org/feed
          purpose: docker-build

      - name: Check Docker secret outputs
        env:
          SECRET_ARGS: ${{ steps.docker_token.outputs.secret_args }}
          SECRET_FILES: ${{ steps.docker_token.outputs.secret_files }}
          SECRET_ID: ${{ steps.docker_token.outputs.secret_id }}
          SECRET_PATH: ${{ steps.docker_token.outputs.secret_path }}
          TOKEN: ${{ steps.docker_token.outputs.token }}
        run: |
          set -euo pipefail
          test -z "$TOKEN"
          test "$SECRET_ID" = "packagemaze_npm"
          test -n "$SECRET_ARGS"
          test -f "$SECRET_PATH"
          test "${SECRET_FILES#packagemaze_npm=}" = "$SECRET_PATH"
          grep -q "fake-docker-token" "$SECRET_PATH"
          grep -q "registry=https://pkg.packagemaze.com/org/feed/" "$SECRET_PATH"
          (
            . "$SECRET_PATH"
            test "$MAZE_TOKEN" = "fake-docker-token"
            test -f "$NPM_CONFIG_USERCONFIG"
            grep -q "registry=https://pkg.packagemaze.com/org/feed/" "$NPM_CONFIG_USERCONFIG"
            test "$COREPACK_NPM_REGISTRY" = "https://pkg.packagemaze.com/org/feed/"
            test "$COREPACK_NPM_TOKEN" = "$MAZE_TOKEN"
          )

      - id: docker_admin_token
        uses: ./
        with:
          release-base-url: http://127.0.0.1:8765
          feed: org/admin
          purpose: docker-build
          secret-id: packagemaze_npm_admin

      - name: Check custom Docker secret id output
        env:
          SECRET_FILES: ${{ steps.docker_admin_token.outputs.secret_files }}
          SECRET_ID: ${{ steps.docker_admin_token.outputs.secret_id }}
          SECRET_PATH: ${{ steps.docker_admin_token.outputs.secret_path }}
        run: |
          set -euo pipefail
          test "$SECRET_ID" = "packagemaze_npm_admin"
          test "${SECRET_FILES#packagemaze_npm_admin=}" = "$SECRET_PATH"
          grep -q "registry=https://pkg.packagemaze.com/org/admin/" "$SECRET_PATH"

      - id: docker_pypi_token
        uses: ./
        with:
          release-base-url: http://127.0.0.1:8765
          feed: org/pypi
          purpose: docker-build

      - name: Check Docker PyPI secret outputs
        env:
          SECRET_ARGS: ${{ steps.docker_pypi_token.outputs.secret_args }}
          SECRET_FILES: ${{ steps.docker_pypi_token.outputs.secret_files }}
          SECRET_ID: ${{ steps.docker_pypi_token.outputs.secret_id }}
          SECRET_PATH: ${{ steps.docker_pypi_token.outputs.secret_path }}
          TOKEN: ${{ steps.docker_pypi_token.outputs.token }}
        run: |
          set -euo pipefail
          test -z "$TOKEN"
          test "$SECRET_ID" = "packagemaze_pypi"
          test -n "$SECRET_ARGS"
          test -f "$SECRET_PATH"
          test "${SECRET_FILES#packagemaze_pypi=}" = "$SECRET_PATH"
          grep -q "fake-pypi-docker-token" "$SECRET_PATH"
          grep -q "PACKAGEMAZE_PYPI_INDEX_SCHEME='http'" "$SECRET_PATH"
          (
            . "$SECRET_PATH"
            test "$MAZE_TOKEN" = "fake-pypi-docker-token"
            test "$PACKAGEMAZE_PYPI_INDEX_SCHEME" = "http"
            test -f "$PIP_CONFIG_FILE"
            grep -q "pkg.packagemaze.test/org/pypi/simple/" "$PIP_CONFIG_FILE"
            case "$PIP_INDEX_URL" in
              http://__token__:*@pkg.packagemaze.test/org/pypi/simple/) ;;
              *) exit 1 ;;
            esac
            test "$UV_INDEX_URL" = "$PIP_INDEX_URL"
            test "$UV_INDEX_PACKAGEMAZE_PASSWORD" = "$MAZE_TOKEN"
            test "$POETRY_HTTP_BASIC_PACKAGEMAZE_PASSWORD" = "$MAZE_TOKEN"
          )

      - id: invalid_package
        uses: ./
        continue-on-error: true
        with:
          release-base-url: http://127.0.0.1:8765
          feed: org/feed
          package: "@scope/package"

      - name: Check package validation
        env:
          OUTCOME: ${{ steps.invalid_package.outcome }}
        run: |
          set -euo pipefail
          test "$OUTCOME" = "failure"

      - uses: ./
        with:
          release-base-url: http://127.0.0.1:8765

      - name: Smoke release install
        run: maze auth exchange-oidc --help

      - name: Stop fake release server
        if: always()
        run: |
          if [ -f fake-release-server.pid ]; then
            kill "$(cat fake-release-server.pid)" || true
          fi
